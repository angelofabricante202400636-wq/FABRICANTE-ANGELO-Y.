<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Inventory</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <h1>Product Inventory</h1>

  <button id="loadBtn">Display Products</button>

  <ul id="list"></ul>

  <h2>Add Product</h2>
  <div class="form-group">
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="category" placeholder="Category">
    <input type="number" id="price" placeholder="Price">
  </div>
  <button id="addBtn">Submit</button>

  <h2>Search Product</h2>
  <div class="form-group">
    <input type="text" id="searchName" placeholder="Search by name">
  </div>
  <button id="searchBtn">Search</button>

  <script>
    const API_URL = '/api/products'; 

    const list = document.getElementById('list');
    const loadBtn = document.getElementById('loadBtn');
    const addBtn = document.getElementById('addBtn');
    const searchBtn = document.getElementById('searchBtn');

    async function loadProducts() {
      const res = await fetch(API_URL);
      const data = await res.json();
      list.innerHTML = '';

      data.forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `
          <strong>${p.name}</strong><br>
          Category: ${p.category}<br>
          Price: ₱${p.price}
        `;

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', () => deleteProduct(p.id));
        li.appendChild(delBtn);

        list.appendChild(li);
      });
    }

    async function addProduct() {
      const name = document.getElementById('name').value;
      const category = document.getElementById('category').value;
      const price = document.getElementById('price').value;

      if (!name || !category || !price) { alert('Fill all fields!'); return; }

      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, category, price })
      });

      document.getElementById('name').value = '';
      document.getElementById('category').value = '';
      document.getElementById('price').value = '';
      loadProducts();
    }

    async function searchProduct() {
      const name = document.getElementById('searchName').value;
      if (!name) return;
      const res = await fetch(`${API_URL}/search?name=${name}`);
      const data = await res.json();
      list.innerHTML = '';
      data.forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `
          <strong>${p.name}</strong><br>
          Category: ${p.category}<br>
          Price: ₱${p.price}
        `;

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', () => deleteProduct(p.id));
        li.appendChild(delBtn);

        list.appendChild(li);
      });
    }

    async function deleteProduct(id) {
      const confirmed = confirm('Are you sure you want to delete this product?');
      if (!confirmed) return;

      await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      loadProducts();
    }

    loadBtn.addEventListener('click', loadProducts);
    addBtn.addEventListener('click', addProduct);
    searchBtn.addEventListener('click', searchProduct);
  </script>
</body>
</html>
